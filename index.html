<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عجلة الحظ المرحة | شاي بُكرة</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Amiri:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  
  <style>
    :root {
      --brand-red: #8d1212;
      --brand-gold: #c1a575;
      --bg-cream: #fdfaf5;
      --ink: #2d1a1a;
    }

    body {
      margin: 0;
      background-color: var(--bg-cream);
      font-family: 'Amiri', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .main-card {
      background: #fff;
      width: 90%;
      max-width: 500px;
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      text-align: center;
      border: 2px solid #f1ece4;
      position: relative;
    }

    .brand-title {
      font-family: 'Aref Ruqaa', serif;
      font-size: 2.5rem;
      color: var(--brand-red);
      margin-bottom: 5px;
    }

    .wheel-box {
      position: relative;
      width: 300px;
      height: 300px;
      margin: 30px auto;
    }

    .pointer {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 35px;
      z-index: 10;
      filter: drop-shadow(0 3px 2px rgba(0,0,0,0.2));
    }

    canvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      box-shadow: 0 0 0 10px #fff, 0 0 20px rgba(0,0,0,0.1);
      transition: transform 4s cubic-bezier(0.15, 0, 0.2, 1);
    }

    .btn-spin {
      background: var(--brand-red);
      color: #fff;
      border: none;
      padding: 15px 45px;
      font-family: 'Tajawal', sans-serif;
      font-weight: bold;
      font-size: 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 15px rgba(141, 18, 18, 0.3);
      transition: 0.3s;
    }

    .btn-spin:active { transform: scale(0.95); }
    .btn-spin:disabled { background: #ccc; cursor: not-allowed; }

    #resultArea {
      margin-top: 25px;
      min-height: 100px;
      display: none;
      animation: bounceIn 0.6s ease;
    }

    @keyframes bounceIn {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    .gift-text {
      font-family: 'Aref Ruqaa', serif;
      font-size: 2rem;
      color: var(--brand-red);
    }

    .funny-phrase {
      font-size: 1.2rem;
      color: #555;
      font-style: italic;
    }

    .lucky { color: #27ae60 !important; } /* لون أخضر للجوائز */
    .unlucky { color: #e67e22 !important; } /* لون برتقالي للمزاح */
  </style>
</head>
<body>

  <div class="main-card">
    <h1 class="brand-title">عجلة الحظ</h1>
    <p style="font-family: 'Tajawal'; color: #888;">من "شاي بُكرة".. يا تصيب يا تخيب!</p>

    <div class="wheel-box">
      <svg class="pointer" viewBox="0 0 30 40">
        <path d="M15 40 L30 0 L0 0 Z" fill="#8d1212"/>
      </svg>
      <canvas id="wheelCanvas" width="400" height="400"></canvas>
    </div>

    <button class="btn-spin" id="spinBtn" onclick="spinWheel()">دوّرها يا بطل!</button>

    <div id="resultArea">
      <div class="gift-text" id="giftText"></div>
      <div class="funny-phrase" id="funnyPhrase"></div>
    </div>
  </div>

  <script>
    const items = [
      { gift: "شاي مكس", type: 'win', phrase: "العيد ما يكمل إلا بلمتكم.. وهذا الشاي هدية!" },
      { gift: "حظك نايم 💤", type: 'lose', phrase: "العجلة تقول لك: روح اشرب موية وارجع جرب!" },
      { gift: "قهوة اليوم", type: 'win', phrase: "صحصح يا جميل.. قهوتك بانتظارك!" },
      { gift: "سوي نفسك ماشفت 🙈", type: 'lose', phrase: "المرة هذي مشيها.. جرب مرة ثانية!" },
      { gift: "شباتي جبن", type: 'win', phrase: "خذلك لقمة تنسيك همومك.. مبروك!" },
      { gift: "العوض في الجنة 😂", type: 'lose', phrase: "حظك اليوم يبغاله صيانة.. حاول مجدداً!" },
      { gift: "فصفص", type: 'win', phrase: "تسالي العيد.. مبروك الفوز!" },
      { gift: "اقلب وجهك 🏃‍♂️", type: 'lose', phrase: "أمزح أمزح! جرب تدورها مرة ثانية برفق." },
      { gift: "مسخن ملكي", type: 'win', phrase: "أنت اليوم ملك الحظ.. هنيئاً لك!" },
      { gift: "قربت كثير! ✨", type: 'lose', phrase: "كنت بتفوز بس العجلة غدارة.. حاول ثاني!" }
    ];

    const colors = ['#8d1212', '#c1a575', '#5b2c2c', '#d4c4a8', '#3d1a1a'];
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    let currentRotation = 0;

    function drawWheel() {
      const sliceAngle = (2 * Math.PI) / items.length;
      items.forEach((item, i) => {
        const startAngle = i * sliceAngle;
        ctx.beginPath();
        ctx.moveTo(200, 200);
        ctx.arc(200, 200, 200, startAngle, startAngle + sliceAngle);
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.save();
        ctx.translate(200, 200);
        ctx.rotate(startAngle + sliceAngle / 2);
        ctx.textAlign = "right";
        ctx.fillStyle = "#fff";
        ctx.font = "bold 18px Tajawal";
        ctx.fillText(item.gift.split(' ')[0], 180, 5); // عرض الكلمة الأولى فقط داخل العجلة
        ctx.restore();
      });
    }

    function spinWheel() {
      const btn = document.getElementById('spinBtn');
      const res = document.getElementById('resultArea');
      btn.disabled = true;
      res.style.display = 'none';

      const spinAdd = Math.floor(Math.random() * 360) + 2880; // 8 دورات
      currentRotation += spinAdd;
      canvas.style.transform = `rotate(${currentRotation}deg)`;

      setTimeout(() => {
        btn.disabled = false;
        showResult();
      }, 4000);
    }

    function showResult() {
      const actualRotation = (currentRotation % 360);
      const sliceAngle = 360 / items.length;
      // حساب الجائزة بناءً على توقف العجلة عند السهم (السهم في الأعلى عند 270 درجة)
      const index = Math.floor(((360 - actualRotation + 270) % 360) / sliceAngle);
      const winner = items[index];

      const giftText = document.getElementById('giftText');
      const funnyPhrase = document.getElementById('funnyPhrase');
      
      giftText.textContent = winner.gift;
      funnyPhrase.textContent = winner.phrase;
      
      // تغيير الألوان والاحتفال
      if(winner.type === 'win') {
        giftText.className = 'gift-text lucky';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
      } else {
        giftText.className = 'gift-text unlucky';
      }

      document.getElementById('resultArea').style.display = 'block';
    }

    drawWheel();
  </script>
</body>
</html>
